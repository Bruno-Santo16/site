<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="refresh" content="0; url=loja/index.html">
    <title>Redirecionando... | Joias Premium</title>
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            background: linear-gradient(135deg, #1a1a1a 0%, #0d0d0d 100%);
            font-family: 'Poppins', sans-serif;
            color: #e0e0e0;
        }
        .redirect-container {
            text-align: center;
        }
        .gem-icon {
            font-size: 4rem;
            color: #d4af37;
            margin-bottom: 1rem;
            animation: sparkle 2s infinite;
        }
        @keyframes sparkle {
            0%, 100% { filter: brightness(1); transform: scale(1); }
            50% { filter: brightness(1.3); transform: scale(1.1); }
        }
        h1 {
            color: #d4af37;
            margin-bottom: 0.5rem;
        }
        p {
            color: #888;
        }
        .loader {
            width: 40px;
            height: 40px;
            border: 4px solid #333;
            border-top-color: #d4af37;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 2rem auto;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        .link {
            color: #d4af37;
            text-decoration: none;
            transition: color 0.3s;
        }
        .link:hover {
            color: #e8d46b;
        }
    </style>
</head>
<body>
    <div class="redirect-container">
        <div class="gem-icon">💎</div>
        <h1>Joias Premium</h1>
        <p>Redirecionando para a loja...</p>
        <div class="loader"></div>
        <p>Se não for redirecionado automaticamente, <a href="loja/index.html" class="link">clique aqui</a>.</p>
    </div>
</body>
</html>
