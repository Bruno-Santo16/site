<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - BS Joias</title>
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Custom CSS -->
    <link rel="stylesheet" href="css/login-styles.css">
</head>
<body>
    <div class="background-animation">
        <div class="circle"></div>
        <div class="circle"></div>
        <div class="circle"></div>
    </div>

    <div class="login-container">
        <div class="login-card">
            <div class="card-header">
                <a href="../loja/index.html" class="back-link"><i class="fas fa-arrow-left"></i> Voltar à Loja</a>
                <div class="logo">
                    <img src="../loja/img/logo.png" alt="BS Joias" onerror="this.src='https://placehold.co/100x100?text=BS'">
                </div>
                <h1>Bem-vindo de volta</h1>
                <p>Acesse sua conta para continuar suas compras</p>
            </div>

            <div class="tabs">
                <button class="tab-btn active" onclick="switchTab('login')">Entrar</button>
                <button class="tab-btn" onclick="switchTab('register')">Cadastrar</button>
            </div>

            <!-- Formulário de Login -->
            <form id="loginForm" class="auth-form active">
                <div class="form-group">
                    <label for="email"><i class="fas fa-envelope"></i> E-mail</label>
                    <input type="email" id="email" placeholder="exemplo@email.com" required>
                </div>
                <div class="form-group">
                    <label for="password"><i class="fas fa-lock"></i> Senha</label>
                    <div class="password-input">
                        <input type="password" id="password" placeholder="Sua senha" required>
                        <i class="fas fa-eye toggle-password" onclick="togglePassword('password')"></i>
                    </div>
                </div>
                <div class="form-options">
                    <label class="checkbox-container">
                        <input type="checkbox" id="rememberMe">
                        <span class="checkmark"></span>
                        Lembrar de mim
                    </label>
                    <a href="#" class="forgot-password">Esqueceu a senha?</a>
                </div>
                <button type="submit" class="btn-submit">Acessar Conta</button>
            </form>

            <!-- Formulário de Cadastro (Simulado) -->
            <form id="registerForm" class="auth-form">
                <div class="form-group">
                    <label for="regName"><i class="fas fa-user"></i> Nome Completo</label>
                    <input type="text" id="regName" placeholder="Seu nome" required>
                </div>
                <div class="form-group">
                    <label for="regEmail"><i class="fas fa-envelope"></i> E-mail</label>
                    <input type="email" id="regEmail" placeholder="exemplo@email.com" required>
                </div>
                <div class="form-group">
                    <label for="regPassword"><i class="fas fa-lock"></i> Senha</label>
                    <div class="password-input">
                        <input type="password" id="regPassword" placeholder="Crie uma senha" required>
                        <i class="fas fa-eye toggle-password" onclick="togglePassword('regPassword')"></i>
                    </div>
                </div>
                <button type="submit" class="btn-submit">Criar Conta</button>
            </form>

            <div class="social-login">
                <p>Ou entre com</p>
                <div class="social-icons">
                    <button class="social-btn google"><i class="fab fa-google"></i></button>
                    <button class="social-btn facebook"><i class="fab fa-facebook-f"></i></button>
                    <button class="social-btn apple"><i class="fab fa-apple"></i></button>
                </div>
            </div>
        </div>
    </div>

    <div id="toastContainer"></div>

    <script src="js/login-script.js"></script>
</body>
</html>
